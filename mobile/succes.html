<style>
        .material-symbols-outlined {
          font-family: 'Material Symbols Outlined';
          font-weight: normal;
          font-style: normal;
          font-size: 24px;
          line-height: 1;
          letter-spacing: normal;
          text-transform: none;
          display: inline-block;
          white-space: nowrap;
          word-wrap: normal;
          direction: ltr;
          -webkit-font-feature-settings: 'liga';
          -webkit-font-smoothing: antialiased;
        }

        /* Success Animation Classes */
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes drawCheck {
            0% { stroke-dashoffset: 48; }
            100% { stroke-dashoffset: 0; }
        }

        .animate-circle-pop {
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .animate-check-draw {
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: drawCheck 0.4s ease-out 0.3s forwards;
        }
    </style>
</head>
<!-- Suppressing Navigation Shells due to Contextual State & Identity rule: Linear/Transactional intent -->
<body class="bg-background text-on-background min-h-[884px] flex flex-col items-center px-margin-mobile py-8 md:hidden">
<!-- Main Content Area -->
<main class="flex-1 w-full flex flex-col items-center justify-center max-w-sm mx-auto mt-12 mb-8">
<!-- Animated Success Icon -->
<div class="w-20 h-20 bg-primary rounded-full flex items-center justify-center mb-8 animate-circle-pop shadow-sm relative">
<svg class="w-10 h-10 text-on-primary absolute" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
<path class="animate-check-draw" d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<!-- Typography Context -->
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-3 text-center">Confirmed.</h1>
<p class="font-body-md text-body-md text-secondary text-center max-w-[280px] mb-10">
            Your order has been placed. We will send an email with your shipping details shortly.
        </p>
<!-- Order Number Anchor -->
<div class="w-full border-t border-b border-surface-container py-4 flex flex-col items-center justify-center mb-10">
<span class="font-label-sm text-label-sm text-secondary uppercase mb-1">Order Number</span>
<span class="font-headline-md text-headline-md text-primary">LX-84729</span>
</div>
<!-- Brief Item Summary (Minimalist Presentation) -->
<div class="w-full bg-surface-container-lowest rounded-lg p-3 border border-surface-container flex items-center gap-4 mb-12 shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
<div class="w-16 h-20 bg-surface-variant flex-shrink-0 overflow-hidden relative">
<img alt="Order item thumbnail" class="w-full h-full object-cover" data-alt="A minimalist, high-end fashion flat lay showing a folded pristine white linen shirt against a soft, light grey studio background. The lighting is bright and diffuse, creating a high-key light mode aesthetic. The composition is clean, geometric, and perfectly aligned, evoking a sense of premium quality and quiet sophistication." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcUFOqp3M_FtnAYvxWV8gA0TIv1XNKjvftQgwJyZB_-k3sw4vh6cMdHpBedJXasxMCKSZSKi45gjRC9uhnIYAW-DM9Ik_pkUC4HK1QPe1mjnflIIKjZHmwy6G5cYTwr1QVHH4d34S9ig-0IZRXfAIjb8RWgh-40ilffZ95RdGk_twnTrQJADCZdz6zWwk7Al-Sy2xnip5cGK_GwDgU4g7RSCKewJ6qBQA9jN6fKtHAONSm1WqUGqpilZl6ztCiCdmmYu9CSu7m2n0">
</div>
<div class="flex-1 flex flex-col justify-center">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider mb-1 block">Oversized Linen Shirt</span>
<span class="font-label-sm text-label-sm text-secondary block mb-2">Color: Bone | Size: M</span>
<span class="font-body-md text-body-md text-primary">$145.00</span>
</div>
</div>
</main>
<!-- Fixed Bottom Actions -->
<div class="w-full max-w-sm mx-auto flex flex-col gap-3 mt-auto pb-4">
<!-- Primary CTA: Solid Black -->
<button class="w-full h-12 bg-primary text-on-primary rounded font-label-sm text-label-sm uppercase tracking-widest flex items-center justify-center active:scale-98 transition-transform duration-200">
            Return to Catalog
        </button>
<!-- Secondary CTA: Ghost/Text Only for minimalist hierarchy -->
<button class="w-full h-12 bg-transparent text-primary rounded font-label-sm text-label-sm uppercase tracking-widest flex items-center justify-center hover:underline active:scale-98 transition-transform duration-200">
            View Order Status
        </button>
</div>
</body></html>
