<style>
        .shimmer {
            background: linear-gradient(to right, #f2f2f2 4%, #e5e5e5 25%, #f2f2f2 36%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .aspect-4-5 {
            aspect-ratio: 4 / 5;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24 pt-16 md:hidden">
<!-- TopAppBar -->
<header class="bg-background/80 backdrop-blur-md fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 max-w-7xl mx-auto">
<button aria-label="menu" class="text-secondary hover:opacity-70 transition-opacity scale-98 active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<div class="font-display-lg-mobile text-display-lg-mobile font-bold tracking-tighter text-primary">LUXE</div>
<button aria-label="shopping_bag" class="text-secondary hover:opacity-70 transition-opacity scale-98 active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">shopping_bag</span>
</button>
</header>
<!-- Main Content -->
<main class="px-margin-mobile pt-6 flex flex-col gap-8">
<!-- Search Bar -->
<div class="w-full bg-surface-container-low rounded-lg h-12 flex items-center px-4 border border-surface-container hover:border-outline-variant transition-colors group">
<span class="material-symbols-outlined text-secondary mr-2">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-body-md text-primary placeholder-secondary outline-none" placeholder="Search collection..." type="text">
</div>
<!-- Catalog Grid (Mobile: 1 column) -->
<div class="flex flex-col gap-10"><article class="flex flex-col gap-4 animate-pulse">
<div class="relative w-full aspect-4-5 bg-surface-container-high rounded-lg overflow-hidden shimmer"></div>
<div class="flex flex-col gap-2">
<div class="h-4 bg-surface-container-high rounded w-3/4 shimmer"></div>
<div class="h-4 bg-surface-container-high rounded w-1/4 shimmer"></div>
<div class="flex gap-2 mt-1">
<div class="w-4 h-4 rounded-full bg-surface-container-high shimmer"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-high shimmer"></div>
</div>
<div class="mt-2 h-3 bg-surface-container-high rounded w-20 shimmer"></div>
</div>
</article>
<!-- Product Card 1 (Skeleton Loading state demonstrated initially via js swap, but showing content for design) -->
<article class="flex flex-col gap-4">
<div class="relative w-full aspect-4-5 bg-surface-container rounded-lg overflow-hidden group">
<div class="absolute top-4 left-4 z-10 bg-primary text-on-primary font-label-sm text-label-sm px-2 py-1 rounded">NEW</div>
<button class="absolute bottom-4 right-4 z-10 bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity md:hidden block hover:scale-105 active:scale-95">
<span class="material-symbols-outlined">add</span>
</button>
<!-- Image Carousel Mock -->
<div class="w-full h-full flex overflow-x-auto snap-x snap-mandatory scrollbar-hide">
<img alt="Product image" class="w-full h-full object-cover snap-center flex-shrink-0" data-alt="A high-fashion studio shot of a minimalist, structured black trench coat. The model is standing in a stark white, light-mode environment with soft, diffused lighting. The image embodies a premium, clean aesthetic with sharp contrasts between the deep black garment and the bright background. It feels modern and sophisticated." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3y54VqJ1eSrR3HdlTxQ4x13xs-dLguMfsyChYue6SPp1xnFEprfnBZOHwKxweH2XUJjfmz21lLLG7QHkog-HGjUhuiDgD2v5WLAS1whmjYh2jWx7jskqvGwZB-orizVLnDxg4vjEcPT3KiEKZet7UYIxdj1GcjYV2uQbBj9qBXgHzmSIh1sZNKPvthqZJl9alywYRnfpWXxVueVZnkPzVMgFxCGgO8e8ZJa3XR8Ga-WuVtNvVHZ0eGb9sOWpAP1tDetKJUKnN6jc">
</div>
<!-- Dots -->
<div class="absolute bottom-4 left-0 w-full flex justify-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
</div>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-body-md text-body-md text-primary font-medium">Structured Wool Coat</h2>
<div class="flex items-center gap-2 font-body-md text-body-md">
<span class="text-primary">€450</span>
<span class="text-secondary line-through text-sm">€550</span>
</div>
<!-- Color Swatches -->
<div class="flex gap-2 mt-1">
<button class="w-4 h-4 rounded-full bg-black border border-outline-variant focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1"></button>
<button class="w-4 h-4 rounded-full bg-[#E5E0D8] border border-outline-variant focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1"></button>
</div>
<button class="mt-2 text-left font-label-sm text-label-sm text-primary underline hover:text-secondary transition-colors w-max">Voir plus</button>
</div>
</article>
<!-- Product Card 2 -->
<article class="flex flex-col gap-4">
<div class="relative w-full aspect-4-5 bg-surface-container rounded-lg overflow-hidden group">
<!-- Image Carousel Mock -->
<div class="w-full h-full flex overflow-x-auto snap-x snap-mandatory scrollbar-hide">
<img alt="Product image" class="w-full h-full object-cover snap-center flex-shrink-0" data-alt="A sleek, minimalist leather handbag placed on a white pedestal. The lighting is bright and even, casting soft, subtle shadows to highlight the premium texture of the leather. The composition is highly symmetrical, fitting a high-end minimalist UI design language. Monochromatic tones dominate the scene." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7zHrFhVHCmrHv_yar1j3P8ekA4xrchdWo4Nk3notLNKfkHJGpGD4dYyNQPtXR41qeGsiXWHObapvkftBfz7lV-53dgqg_ob39BavsDy-AXkSV2Ym2F_b1mzrJ0OLCpUyvBQg6I4CBsAm-0no9CGBLxEsqxoJTbtoOcDQUa6zG9K8QPIV7F0Rg-7IIYg8O5ofBqotYXLEMnkdIxAkhu6uGq6ndWkaLUX042ndUCqxPcNwFEHdkRl9QsVXTO4e4pcPTO2oFge2ce_c">
</div>
<!-- Dots -->
<div class="absolute bottom-4 left-0 w-full flex justify-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
</div>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-body-md text-body-md text-primary font-medium">Minimalist Leather Tote</h2>
<div class="flex items-center gap-2 font-body-md text-body-md">
<span class="text-primary">€280</span>
</div>
<!-- Color Swatches -->
<div class="flex gap-2 mt-1">
<button class="w-4 h-4 rounded-full bg-black border border-outline-variant focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1"></button>
</div>
<button class="mt-2 text-left font-label-sm text-label-sm text-primary underline hover:text-secondary transition-colors w-max">Voir plus</button>
</div>
</article>
</div>
<!-- Pagination -->
<div class="flex justify-center items-center gap-4 py-8">
<button class="w-10 h-10 flex items-center justify-center border border-outline-variant rounded-full text-secondary hover:border-primary hover:text-primary transition-colors disabled:opacity-50" disabled="">
<span class="material-symbols-outlined text-sm">chevron_left</span>
</button>
<span class="font-label-sm text-label-sm text-primary">1 / 12</span>
<button class="w-10 h-10 flex items-center justify-center border border-outline-variant rounded-full text-secondary hover:border-primary hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">chevron_right</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-16 bg-background border-t border-surface-container z-50 px-margin-mobile pb-safe">
<button aria-label="home" class="flex flex-col items-center justify-center text-primary scale-110 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</button>
<button aria-label="search" class="flex flex-col items-center justify-center text-secondary hover:text-primary scale-98 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">search</span>
</button>
<button aria-label="favorite" class="flex flex-col items-center justify-center text-secondary hover:text-primary scale-98 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">favorite</span>
</button>
<button aria-label="person" class="flex flex-col items-center justify-center text-secondary hover:text-primary scale-98 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">person</span>
</button>
</nav>
</body></html>
