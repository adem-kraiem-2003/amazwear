<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar hiding for clean minimal look */
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-primary antialiased font-sans flex justify-center items-center h-screen overflow-hidden">
<!-- Mobile Device Simulator Container (for presentation purposes) -->
<div class="relative w-full h-full max-w-md mx-auto bg-surface-container-lowest overflow-hidden shadow-2xl md:border md:border-surface-container md:rounded-[40px] md:h-[850px]">
<!-- Background Image Context -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="A high-end editorial fashion photograph featuring a model in minimalist, avant-garde clothing against a stark white studio background. The lighting is crisp and bright, creating a clean, modern aesthetic that perfectly matches a luxury brand's visual identity. The composition uses generous negative space, allowing the clothing silhouettes to dominate." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuApzWzDqqu9MTew5FK5cx5Z5iAXPIimAOwPivqpQgIhIiss4uburVnp4NAo71I323QGbpl4UAEnI2ODwZChouHhqcRKD91ho_PBLtBHWT0ubCM2C8f4SJSk3UZpEMBZ53tu-ifRzKe80dcJBk1YeHaop19CV7H4JkqipeX7_c6QFhkCAe731pkG8DMNMy-cBcH9CEkbp4zpOuoayCvKT7AbHpy_nzLiSXtJedKUE-ij2AsIsIMSjBAtzZW0475keMSmCvMNPYy0YQQ');"></div>
<!-- Darkening Overlay to make nav pop -->
<div class="absolute inset-0 bg-primary/20 backdrop-blur-md z-10"></div>
<!-- Simulated Top App Bar (Background context) -->
<header class="absolute top-0 w-full z-20 flex justify-between items-center px-margin-mobile h-16 bg-transparent pointer-events-none">
<span class="material-symbols-outlined text-on-primary">menu</span>
<span class="font-display-lg-mobile text-display-lg-mobile font-bold tracking-tighter text-on-primary uppercase">LUXE</span>
<span class="material-symbols-outlined text-on-primary">shopping_bag</span>
</header>
<!-- Side Navigation Drawer -->
<!-- Fixed to the left, full height, sliding in -->
<nav class="absolute top-0 left-0 h-full w-[85%] max-w-[320px] bg-surface-container-lowest z-50 flex flex-col shadow-2xl transform transition-transform duration-500 ease-[cubic-bezier(0.25,1,0.5,1)] translate-x-0" id="mobile-nav">
<!-- Header section of nav -->
<div class="flex justify-between items-center px-margin-mobile h-16 w-full">
<span class="font-display-lg-mobile text-[24px] font-bold tracking-tighter text-primary uppercase">LUXE</span>
<button aria-label="Close menu" class="flex items-center justify-center w-12 h-12 -mr-3 text-primary hover:opacity-70 transition-opacity active:scale-95">
<span class="material-symbols-outlined" style="font-size: 28px;">close</span>
</button>
</div>
<!-- Main Links Navigation -->
<div class="flex-1 px-margin-mobile pt-12 flex flex-col gap-8 overflow-y-auto">
<a class="font-headline-md text-headline-md text-primary hover:text-secondary transition-colors group flex items-center justify-between" href="#">
<span>New In</span>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 transition-opacity transform -translate-x-4 group-hover:translate-x-0 duration-300">arrow_forward</span>
</a>
<a class="font-headline-md text-headline-md text-primary hover:text-secondary transition-colors group flex items-center justify-between" href="#">
<span>Ready to Wear</span>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 transition-opacity transform -translate-x-4 group-hover:translate-x-0 duration-300">arrow_forward</span>
</a>
<a class="font-headline-md text-headline-md text-primary hover:text-secondary transition-colors group flex items-center justify-between" href="#">
<span>Accessories</span>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 transition-opacity transform -translate-x-4 group-hover:translate-x-0 duration-300">arrow_forward</span>
</a>
<a class="font-headline-md text-headline-md text-primary hover:text-secondary transition-colors group flex items-center justify-between" href="#">
<span>Journal</span>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 transition-opacity transform -translate-x-4 group-hover:translate-x-0 duration-300">arrow_forward</span>
</a>
</div>
<!-- Footer Utilities -->
<div class="px-margin-mobile pb-12 pt-8 flex flex-col gap-6">
<!-- Subtle divider -->
<div class="w-full h-[1px] bg-surface-container mb-2"></div>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors uppercase tracking-widest flex items-center gap-3" href="#">
<span class="material-symbols-outlined text-[18px]">person</span>
                    Account
                </a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors uppercase tracking-widest flex items-center gap-3" href="#">
<span class="material-symbols-outlined text-[18px]">eco</span>
                    Sustainability
                </a>
</div>
</nav>
</div>
<!-- Minimal interaction script for demonstration -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.querySelector('button[aria-label="Close menu"]');
            const nav = document.getElementById('mobile-nav');
            const overlay = document.querySelector('.backdrop-blur-md');

            // Simulate closing the menu
            closeBtn.addEventListener('click', () => {
                nav.style.transform = 'translateX(-100%)';
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            });
        });
    </script>
</body></html>
