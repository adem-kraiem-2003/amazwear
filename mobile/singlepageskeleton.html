<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Product Details - Loading</title>
<!-- Google Fonts & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "surface-dim": "#dadada",
                    "on-primary-fixed-variant": "#474747",
                    "primary-fixed": "#e2e2e2",
                    "on-background": "#1a1c1c",
                    "on-tertiary": "#ffffff",
                    "outline": "#7e7576",
                    "on-secondary-fixed-variant": "#464747",
                    "surface-variant": "#e2e2e2",
                    "primary-fixed-dim": "#c6c6c6",
                    "surface-container-low": "#f3f3f4",
                    "on-tertiary-fixed-variant": "#454749",
                    "surface": "#f9f9f9",
                    "inverse-on-surface": "#f0f1f1",
                    "primary-container": "#1b1b1b",
                    "on-primary-container": "#848484",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e2e2e2",
                    "on-secondary-container": "#626262",
                    "outline-variant": "#cfc4c5",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#1a1c1d",
                    "surface-bright": "#f9f9f9",
                    "primary": "#000000",
                    "on-secondary-fixed": "#1b1c1c",
                    "secondary-fixed-dim": "#c7c6c6",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#838486",
                    "surface-container": "#eeeeee",
                    "on-error": "#ffffff",
                    "surface-tint": "#5e5e5e",
                    "background": "#f9f9f9",
                    "secondary-container": "#e1dfdf",
                    "surface-container-high": "#e8e8e8",
                    "secondary-fixed": "#e4e2e2",
                    "on-primary-fixed": "#1b1b1b",
                    "tertiary-fixed-dim": "#c6c6c8",
                    "on-surface": "#1a1c1c",
                    "tertiary-fixed": "#e2e2e4",
                    "secondary": "#5e5e5e",
                    "inverse-primary": "#c6c6c6",
                    "tertiary-container": "#1a1c1d",
                    "on-surface-variant": "#4c4546",
                    "tertiary": "#000000",
                    "inverse-surface": "#2f3131"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-mobile": "20px",
                    "margin-desktop": "64px",
                    "unit": "8px",
                    "gutter": "16px",
                    "aspect-ratio": "4:5"
            },
            "fontFamily": {
                    "display-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "display-lg-mobile": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                    "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                    "display-lg-mobile": ["36px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                    "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "500" }],
                    "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                    "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }]
            }
          }
        }
      }
    </script>
<style>
        /* Skeleton Shimmer Animation */
        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }
        .skeleton {
            background-color: #F2F2F2;
            background-image: linear-gradient(90deg, #F2F2F2 0px, #FAFAFA 100px, #F2F2F2 200px);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
            border-radius: 0.25rem; /* matches 'rounded-lg' from guidelines */
        }
    </style>
</head>
<body class="bg-background text-on-background antialiased min-h-screen">
<!-- Top App Bar (Static) -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md flex justify-between items-center px-margin-mobile h-16 max-w-7xl mx-auto">
<button class="text-primary hover:opacity-70 transition-opacity scale-98 active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="font-display-lg-mobile text-display-lg-mobile font-bold tracking-tighter text-primary">LUXE</div>
<button class="text-primary hover:opacity-70 transition-opacity scale-98 active:scale-95 duration-200">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop">
<!-- Product Details Layout (2-col grid on desktop, stacked on mobile) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
<!-- Left: Hero Image Skeleton -->
<div class="w-full flex flex-col gap-4">
<div class="w-full aspect-[4/5] skeleton"></div>
</div>
<!-- Right: Product Information Skeletons -->
<div class="w-full flex flex-col pt-4 md:pt-12">
<!-- Brand / Category -->
<div class="h-4 w-24 skeleton mb-4"></div>
<!-- Title -->
<div class="h-10 w-3/4 skeleton mb-4"></div>
<!-- Price -->
<div class="h-6 w-1/4 skeleton mb-10"></div>
<!-- Separator -->
<div class="w-full h-px bg-surface-container mb-8"></div>
<!-- Color Selection -->
<div class="mb-8">
<div class="h-4 w-16 skeleton mb-4"></div>
<div class="flex gap-4">
<div class="h-10 w-10 skeleton !rounded-full"></div>
<div class="h-10 w-10 skeleton !rounded-full"></div>
<div class="h-10 w-10 skeleton !rounded-full"></div>
</div>
</div>
<!-- Size Selection -->
<div class="mb-10">
<div class="flex justify-between items-center mb-4">
<div class="h-4 w-16 skeleton"></div>
<div class="h-3 w-20 skeleton"></div>
</div>
<div class="grid grid-cols-4 gap-4">
<div class="h-12 w-full skeleton"></div>
<div class="h-12 w-full skeleton"></div>
<div class="h-12 w-full skeleton"></div>
<div class="h-12 w-full skeleton"></div>
</div>
</div>
<!-- Add to Cart (Desktop) -->
<div class="hidden md:block h-12 w-full skeleton mb-10"></div>
<!-- Description -->
<div class="flex flex-col gap-3 mb-8">
<div class="h-4 w-full skeleton"></div>
<div class="h-4 w-11/12 skeleton"></div>
<div class="h-4 w-full skeleton"></div>
<div class="h-4 w-4/5 skeleton"></div>
</div>
</div>
</div>
<!-- Complete the Look Section -->
<section class="mt-24 md:mt-32">
<h2 class="font-headline-md text-headline-md mb-8">Complete the Look</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-gutter">
<!-- Card 1 -->
<div class="flex flex-col gap-3">
<div class="w-full aspect-[4/5] skeleton"></div>
<div class="h-4 w-3/4 skeleton mt-2"></div>
<div class="h-4 w-1/3 skeleton"></div>
</div>
<!-- Card 2 -->
<div class="flex flex-col gap-3">
<div class="w-full aspect-[4/5] skeleton"></div>
<div class="h-4 w-2/3 skeleton mt-2"></div>
<div class="h-4 w-1/4 skeleton"></div>
</div>
<!-- Card 3 -->
<div class="flex flex-col gap-3">
<div class="w-full aspect-[4/5] skeleton"></div>
<div class="h-4 w-4/5 skeleton mt-2"></div>
<div class="h-4 w-1/2 skeleton"></div>
</div>
<!-- Card 4 -->
<div class="flex flex-col gap-3 hidden md:flex">
<div class="w-full aspect-[4/5] skeleton"></div>
<div class="h-4 w-3/4 skeleton mt-2"></div>
<div class="h-4 w-1/3 skeleton"></div>
</div>
</div>
</section>
</main>
<!-- Mobile Sticky Add to Cart (Skeleton) -->
<div class="fixed bottom-0 w-full bg-background/90 backdrop-blur-sm border-t border-surface-container p-margin-mobile md:hidden z-50 flex items-center justify-center">
<div class="h-12 w-full skeleton"></div>
</div>
</body></html>
