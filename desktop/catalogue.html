<script>
        // Simple header scroll effect (subtle drop shadow on scroll)
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                header.classList.add('shadow-sm', 'bg-surface/95', 'backdrop-blur-md');
                header.classList.remove('bg-surface');
            } else {
                header.classList.remove('shadow-sm', 'bg-surface/95', 'backdrop-blur-md');
                header.classList.add('bg-surface');
            }
        });
    </script>
